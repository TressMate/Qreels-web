<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="80" r="220" fill="white" opacity="0.04"/>
  <circle cx="150" cy="550" r="180" fill="white" opacity="0.04"/>

  <!-- Logo mark -->
  <rect x="80" y="80" width="72" height="72" rx="16" fill="white" opacity="0.15"/>
  <circle cx="109" cy="109" r="20" fill="none" stroke="white" stroke-width="7"/>
  <polygon points="117,121 135,132 117,143" fill="white"/>

  <!-- QReels wordmark -->
  <text x="170" y="132" font-family="Arial, sans-serif" font-size="44" font-weight="800" fill="white" letter-spacing="-1">QReels</text>

  <!-- Main headline -->
  <text x="80" y="300" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="-2">Turn Screen Time Into</text>
  <text x="80" y="390" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="#93c5fd" letter-spacing="-2">Learning Time</text>

  <!-- Subtitle -->
  <text x="80" y="470" font-family="Arial, sans-serif" font-size="30" fill="white" opacity="0.75">Short curiosity-driven learning reels designed for kids.</text>

  <!-- URL -->
  <text x="80" y="560" font-family="Arial, sans-serif" font-size="24" fill="white" opacity="0.5">qreels.in</text>
</svg>
